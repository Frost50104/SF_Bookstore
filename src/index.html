<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══ HEADER ══════════════════════════════════════════════════════════ -->
  <header class="header" id="header">
    <div class="header__inner">
      <a class="header__logo" href="/">Bookshop</a>

      <nav class="header__nav">
        <ul class="header__nav-list">
          <li><a class="header__nav-link header__nav-link--active" href="#">Books</a></li>
          <li><a class="header__nav-link" href="#">Audiobooks</a></li>
          <li><a class="header__nav-link" href="#">Stationery &amp; Gifts</a></li>
          <li><a class="header__nav-link" href="#">Blog</a></li>
        </ul>
      </nav>

      <div class="header__actions">
        <button class="header__btn" aria-label="Sign in">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <button class="header__btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="22" y2="22"/>
          </svg>
        </button>
        <button class="header__btn header__btn--cart" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge hidden" id="cart-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══ HERO ════════════════════════════════════════════════════════════ -->
  <section class="hero">
    <div class="hero__slider-col">
      <div class="slider" id="slider">
        <div class="slider__track" id="slider-track"></div>
        <div class="slider__dots" id="slider-dots"></div>
      </div>

      <a class="promo promo--purple" href="#">
        <span class="promo__text">Change old book on new</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      <a class="promo promo--pink" href="#">
        <span class="promo__text">Top 100 books 2026</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  </section>

  <!-- ═══ MAIN ════════════════════════════════════════════════════════════ -->
  <main class="main">
    <div class="sidebar-col">
      <ul class="categories" id="categories-list"></ul>
    </div>

    <div class="content-col">
      <div class="books-grid" id="books-grid"></div>
      <div class="load-more-wrapper">
        <button class="btn-load-more hidden" id="load-more">Load more</button>
      </div>
    </div>
  </main>

</body>
</html>
